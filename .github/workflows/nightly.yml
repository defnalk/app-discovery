name: nightly-discovery
on:
  schedule:
    - cron: '15 2 * * *' # 02:15 UTC nightly
  workflow_dispatch: {}

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # successful runs take 24–32 min; fetch timeouts mean no more 2h hangs
    permissions:
      contents: read
      issues: write # the failure-alert steps below open/close a tracking issue
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      # Node 24 became the forced runner default mid-June and its stricter npm
      # started failing `npm ci`; fall back to `npm install` so deps always land.
      - run: npm ci --no-audit --no-fund || npm install --no-audit --no-fund
      - run: npm run nightly
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          PRODUCT_HUNT_TOKEN: ${{ secrets.PRODUCT_HUNT_TOKEN }}
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
          INSTANTLY_API_KEY: ${{ secrets.INSTANTLY_API_KEY }}
      # Push the freshly built public/index.html to Vercel. Runs whenever the
      # dashboard was produced (even if an upstream source failed) and a
      # VERCEL_TOKEN secret is present — so it's a safe no-op until you add it.
      - name: Deploy dashboard to Vercel
        if: ${{ always() && env.VERCEL_TOKEN != '' && hashFiles('public/index.html') != '' }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: public
        # Strip any stray whitespace/newlines from the pasted token (Vercel tokens
        # are alphanumeric) so a copy-paste artifact can't break the deploy.
        run: |
          TOKEN="$(printf '%s' "$VERCEL_TOKEN" | tr -d '[:space:]')"
          npx vercel@54 deploy --prod --yes --token "$TOKEN"
      - name: upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-logs
          path: logs/
          retention-days: 14

      # Surface failures the moment they happen instead of letting a red ✗ rot in
      # the Actions tab for days (which is how the chart data silently went stale
      # for ~a week). Opens a single tracking issue and assigns it — which emails
      # the assignee — then comments on repeat failures and auto-closes on the
      # next healthy run. Uses the built-in GITHUB_TOKEN; no external secrets.
      - name: Open failure alert
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const run = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const day = new Date().toISOString().slice(0, 10);
            const body = [
              `Nightly chart-data refresh **failed** on ${day}.`,
              ``,
              `Run: ${run}`,
              ``,
              'The dashboard may be stale until this is fixed — open the failed job and look for a `✗ <job> failed` line.',
            ].join('\n');
            const open = (await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 }))
              .data.filter((i) => !i.pull_request && i.title.includes('Nightly discovery failing'));
            if (open.length) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open[0].number, body });
            } else {
              await github.rest.issues.create({ owner, repo, title: '🔴 Nightly discovery failing', body, assignees: ['defnalk'] });
            }

      - name: Clear failure alert on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const open = (await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 }))
              .data.filter((i) => !i.pull_request && i.title.includes('Nightly discovery failing'));
            for (const i of open) {
              await github.rest.issues.createComment({ owner, repo, issue_number: i.number, body: `✓ Recovered — run ${context.runId} succeeded.` });
              await github.rest.issues.update({ owner, repo, issue_number: i.number, state: 'closed' });
            }
